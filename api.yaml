openapi: 3.1.0
info:
  title: Fédération de collectivités agricoles
  version: 1.0.0
servers:
  - url: 'http://localhost:8080'
tags:
  - name: Collectivités 
    description: "A - Ouverture et gestion des collectivités agricoles"
  - name: Membres
    description: "B - Gestion des membres et de leur adhésion"
components:
  parameters:
    CollectiviteId:
      name: id
      in: path
      description: "ID de la collectivité agricole"
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1
        example: 1
    MembreId:
      name: membreId
      in: path
      description: "ID d'un membre d'une collectivité agricole"
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1
      example: 1

  schemas:
    SpecialiteAgricole:
      type: string
      description: "Spécialité agricole de la collectivité"
      enum:
        - RIZICULTURE
        - MARAICHAGE
        - ELEVAGE
        - ARBORICULTURE
        - PECHE
        - AUTRE
      example: RIZICULTURE
    Collectivite:
      type: object
      required:
        - id
        - numero
        - nom
        - ville
        - specialite
        - dateCreation
        - nombreMembres
      properties:
        id:
          type: integer
          format: int32
          description: "Identifiant unique de la collectivité"
          example: 1
        numero:
          type: string
          description: "Numéro d'identification de la collectivité"
          example: "CA-001"
        nom:
          type: string
          description: "Nom de la collectivité"
          example: "Collectivité Rizicole d'Ambatondrazaka"
        ville:
          type: string
          description: "Ville où se situe la collectivité"
          example: "Ambatondrazaka"
        specialite:
          $ref: '#/components/schemas/SpecialiteAgricole'
        dateCreation:
          type: string
          format: date
          description: "Date de création de la collectivité"
          example: "2020-04-15"
        nombreMembres:
          type: integer
          description: "Nombre de membres dans la collectivité"
          minimum: 10
          example: 50
    CreateCollectivite:
      type: object
      required:
        - nom
        - ville
        - specialite
      properties:
        nom:
          type: string
          description: "Nom de la collectivité"
          example: "Collectivité Maraîchère de Toamasina"
        ville:
          type: string
          description: "Ville où se situe la collectivité"
          example: "Toamasina"
        specialite:
          $ref: '#/components/schemas/SpecialiteAgricole'
    ErrorResponse:
          type: string
          description: "Message d'erreur en cas de problème lors de la création de la collectivité"
          example: "Le nom de la collectivité est requis."

    TypeCotisation:
      type: string
      enum: [MENSUELLE, ANNUELLE, PONCTUELLE]
      description: "Cotisation périodique (mensuelle/annuelle) ou ponctuelle pour événement spécifique ou imprévu"
      example: MENSUELLE

    ModePaiement:
      type: string
      enum: [ESPECE, VIREMENT_BANCAIRE, MOBILE_MONEY]
      description: "Mode de paiement : espèce, virement bancaire ou mobile money"
      example: MOBILE_MONEY

    Cotisation:
      type: object
      required:
        - id
        - collectivite
        - membre
        - montant
        - dateEncaissement
        - modePaiement
        - typeCotisation
      properties:
        id:
          type: integer
          format: int64
          description: "Identifiant unique de la cotisation"
          example: 1
        collectivite:
          $ref: '#/components/schemas/Collectivite'
          description: "Collectivité concernée"
        membre:
          $ref: '#/components/schemas/Membre'
          description: "Membre ayant effectué le paiement"
        montant:
          type: integer
          minimum: 1
          description: "Montant de la cotisation en MGA"
          example: 50000
        dateEncaissement:
          type: string
          format: date
          description: "Date de l'encaissement (trace écrite obligatoire)"
          example: "2026-04-16"
        modePaiement:
          $ref: '#/components/schemas/ModePaiement'
        typeCotisation:
          $ref: '#/components/schemas/TypeCotisation'

    CreateCotisation:
      type: object
      required:
        - membreId
        - montant
        - modePaiement
        - typeCotisation
      properties:
        membreId:
          type: integer
          format: int64
          description: "ID du membre qui paie la cotisation"
        montant:
          type: integer
          minimum: 1
        modePaiement:
          $ref: '#/components/schemas/ModePaiement'
        typeCotisation:
          $ref: '#/components/schemas/TypeCotisation'

    CreateReversement:
      type: object
      required:
        - collectiviteId
        - montant
        - pourcentageApplied
      properties:
        collectiviteId:
          type: integer
          format: int64
        montant:
          type: integer
        pourcentageApplied:
          type: number
          format: float

    Reversement:
      type: object
      required:
        - id
        - collectivite
        - montant
        - dateReversement
        - pourcentageApplied
      properties:
        id:
          type: integer
          format: int64
          description: "Identifiant unique du reversement"
        collectivite:
          $ref: '#/components/schemas/Collectivite'
          description: "Collectivité qui reverse à la fédération"
        montant:
          type: integer
          description: "Montant reversé en MGA"
        dateReversement:
          type: string
          format: date
          description: "Date du reversement"
        pourcentageApplied:
          type: number
          format: float
          description: "Pourcentage des cotisations périodiques reversé à la fédération (valeur à déterminer)"

    Genre:
        type: string
        description: "Genre d'un membre"
        enum:
          - MASCULIN
          - FEMININ
          - AUTRE
        example: MASCULIN
    Poste:
        type: string
        description: "Poste occupé par un membre au sein d'une collectivité"
        enum:
          - PRESIDENT
          - VICE_PRESIDENT
          - SECRETAIRE
          - TRESORIER
          - MEMBRE_CONFIRME
          - MEMBRE_JUNIOR
        example: PRESIDENT
    Parrain: 
        type: object
        required:
          - membreId
          - relationCandidat
        properties:
          membreId:
            type: integer
            format: int32
            description: "ID du membre cofirmé parrain"
            example: 4
          relationCandidat:
            type: string
            description: "Relation entre le parrain et le candidat (ex. ami, voisin, collègue)"
            example: "ami de longue date"
    Membre:
      type: object
      required:
        - id
        - nom
        - prenom
        - dateNaissance
        - genre
        - adresse
        - metier
        - telephone
        - email
        - dateAdhesion
        - poste
      properties:
          id:
            type: integer
            format: int32
            description: "Identifiant unique du membre"
            example: 1
          nom:
            type: string
            description: "Nom de famille du membre"
            example: "Rasolo"
          prenom:
            type: string
            description: "Prénom du membre"
            example: "Jean"
          dateNaissance:
            type: string
            format: date
            description: "Date de naissance du membre"
            example: "1985-07-20"
          genre:
            $ref: '#/components/schemas/Genre'
          adresse:
            type: string
            description: "Adresse du membre"
            example: "Lot II J 45, Antananarivo"
          metier:
            type: string
            description: "Métier du membre en dehors de la collectivité"
            example: "Agriculteur"
          telephone:
            type: string
            description: "Numéro de téléphone du membre"
            example: "+261 34 12 345 67"
          email:
            type: string
            format: email
            description: "Adresse email du membre"
            example: "rasolojean@gmail.com"
          dateAdhesion:
            type: string
            format: date
            description: "Date d'adhésion du membre à la collectivité"
            example: "2020-01-15"
          poste:
            $ref: '#/components/schemas/Poste'
    CreateMembre:
        type: object
        required:
          - nom
          - prenom
          - dateNaissance
          - genre
          - adresse
          - metier
          - telephone
          - email
          - parrains
        properties:
          nom:
            type: string
            example: "Andrianarisoa"
          prenom:
            type: string
            example: "Marie"
          dateNaissance:
            type: string
            format: date
            example: "1990-03-10"
          genre:
            $ref: '#/components/schemas/Genre'
          adresse:
            type: string
            example: "Lot IV A 12, Toamasina"
          metier:
            type: string
            example: "Commerçante"
          telephone:
            type: string
            example: "+261 33 12 345 67"
          email:
            type: string
            format: email
            example: "marie93@gmail.com"
          parrains:
            type: array
            minItems: 2
            items:
              $ref: '#/components/schemas/Parrain'

    StatistiquesMembre:
      type: object
      required:
        - membreId
        - nom
        - prenom
        - tauxAssiduite
        - montantEncaissement
        - montantImpayePotentiel
      properties:
        membreId:
          type: integer
          format: int32
          description: "ID du membre"
          example: 5
        nom:
          type: string
          description: "Nom du membre"
          example: "Rakoto"
        prenom:
          type: string
          description: "Prénom du membre"
          example: "Jean"
        tauxAssiduite:
          type: number
          format: float
          description: "Taux d’assiduité sur la période donnée (en pourcentage, de 0 à 100)"
          minimum: 0
          maximum: 100
          example: 85.5
        montantEncaissement:
          type: integer
          description: "Montant total encaissé par le membre sur la période (en MGA)"
          minimum: 0
          example: 150000
        montantImpayePotentiel:
          type: integer
          description: "Montant potentiel impayé par le membre sur la période (en MGA)"
          minimum: 0
          example: 50000

    RapportMensuelCollectivite:
      type: object
      required:
        - collectiviteId
        - nomCollectivite
        - mois
        - annee
        - nombreMembresActifs
        - tauxAssiduiteGlobal
      properties:
        collectiviteId:
          type: integer
          format: int32
          description: "ID de la collectivité"
          example: 1
        nomCollectivite:
          type: string
          description: "Nom de la collectivité"
          example: "Collectivité Rizicole d'Ambatondrazaka"
        mois:
          type: integer
          description: "Mois du rapport (1 = janvier, 12 = décembre)"
          minimum: 1
          maximum: 12
          example: 3
        annee:
          type: integer
          description: "Année du rapport"
          example: 2026
        nombreMembresActifs:
          type: integer
          description: "Nombre de membres actifs (n’ayant pas démissionné) dans la collectivité"
          minimum: 0
          example: 45
        tauxAssiduiteGlobal:
          type: number
          format: float
          description: "Taux d’assiduité global de la collectivité sur le mois (en pourcentage, de 0 à 100)"
          minimum: 0
          maximum: 100
          example: 78.3

paths:
  /collectivites:
    get:
      tags:
        - Collectivités
      summary: "Lister toutes les collectivités"
      description: "Retourne la liste de toutes les collectivités de la fédération"
      operationId: getCollectivites
      responses:
        '200':
          description: "Liste des collectivités"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivite'
                example:
                  - id: 1
                    numero: "CA-001"
                    nom: "Collectivité Rizicole d'Ambatondrazaka"
                    ville: "Ambatondrazaka"
                    specialite: RIZICULTURE
                    dateCreation: "2020-04-15"
                    nombreMembres: 50
                  - id: 2
                    numero: "CA-002"
                    nom: "Collectivité Maraîchère de Toamasina"
                    ville: "Toamasina"
                    specialite: MARAICHAGE
                    dateCreation: "2021-06-20"
                    nombreMembres: 30
        '500':
          description: "Erreur interne du serveur"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Collectivités
      summary: Ouvrir une nouvelle collectivité
      description: "Crée une nouvelle collectivité agricole. La fédération valide les conditions
        d'ouverture (au moins 10 membres avec 5 membres ayant6 mois d'ancienneté, postes spécifiques
        pourvus, autorisation formelle accordée)."
      operationId: createCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectivite'
      responses:
        '201':
          description: "Collectivité créée avec succès"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
              example:
                id: 3
                numero: "CA-003"
                nom: "Collectivité Arboricole de Fianarantsoa"
                ville: "Fianarantsoa"
                specialite: ARBORICULTURE
                dateCreation: "2022-01-10"
                nombreMembres: 15
        '400':
          description: "Requête invalide - conditions d'ouverture non remplies ou données manquantes"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: "Le nombre de membres doit être d'au moins 10, avec au moins 5 membres ayant au moins 6 mois d'ancienneté."
        '500':
          description: "Erreur interne du serveur"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: "Une erreur est survenue lors du traitement de la demande."
  /collectivites/{CollectiviteId}:
    get:
      tags:
        - Collectivités
      summary: "Obtenir une collectivité par son ID"
      description: "Retourne les détails d'une collectivité spécifique en fonction de son ID."
      operationId: getCollectiviteById
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      responses:
        '200':
          description: "Collectivité trouvée"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
              example:
                id: 1
                numero: "CA-001"
                nom: "Collectivité Rizicole d'Ambatondrazaka"
                ville: "Ambatondrazaka"
                specialite: RIZICULTURE
                dateCreation: "2020-04-15"
                nombreMembres: 50
        '404':
          description: "Collectivité non trouvée"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: "Aucune collectivité trouvée avec l'ID spécifié."
        '500':
          description: "Erreur interne du serveur"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: "Une erreur est survenue lors du traitement de la demande."

  /collectivites/{collectiviteId}/membres:
    get:
      tags:
        - Membres
      summary: Lister les membres d'une collectivité
      description: Retourne la liste de tous les membres inscrits dans une collectivité donnée.
      operationId: getMemberByCollectivite
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      responses:
        '200':
          description: Liste des membres
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Membre'
                example:
                  -id: 1
                  nom: "Rakoto"
                  prenom: "Jean"
                  dateNaissance: "1990-05-20"
                  genre: MASCULIN
                  adresse: "Lot II J 45, Antananarivo"
                  metier: "Agriculteur"
                  telephone: "+261341234567"
                  email: "jean.rakoto@example.com"
                  dateAdhesion: "2023-01-10"
                  poste: MEMBRE_CONFIRME
        '404':
          description: Collectivité introuvable
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Erreur interne du serveur.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Membres
      summary: Admettre un nouveau membre dans une collectivité
      description: Admet un nouveau membre au sein de la collectivité. Requiert un parrain
        membre confirmé avec plus de 90 jours d'ancienneté. Le frais d'adhésion
        de 50 000 MGA est géré séparément via l'endpoint de cotisation.
      operationId: admitMember
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMembre'
            example:
              nom: "Andria"
              prenom: "Marie"
              dateNaissance: "1995-08-12"
              genre: FEMININ
              adresse: "Rue de la Paix, Fianarantsoa"
              metier: "Éleveuse"
              telephone: "+261331234567"
              email: "marie.andria@example.com"
              idParrain: 5
      responses:
        '201':
          description: Membre admis avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '400':
          description: Conditions d'admission non remplies (parrain invalide, données manquantes).
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: "Le parrain doit être un membre confirmé avec plus de 90 jours d'ancienneté."
        '404':
          description: Collectivité introuvable.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Erreur interne du serveur.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /collectivites/{collectiviteId}/membres/{membreId}:
    get:
      tags:
        - Membres
      summary: Obtenir un membre par ID
      description: Retourne les informations détaillées d'un membre dans une collectivité.
      operationId: getMemberById
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      responses:
        '200':
          description: Membre trouvé
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          description: Collectivité/membre introuvable
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Erreur interne du serveur
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - Membres
      summary: Démissioner/retirer un membre d'une collectivité
      description: Permet à un membre de démissionner ou d'être retiré d'une collectivité
        (ex. changement de ville). Le membre reste dans la fédération.
      operationId: removeMember
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      responses:
        '200':
          description: Membre retiré avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '404':
          description: Collectivité/membre introuvable
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Erreur interne du serveur
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /collectivites/{collectiviteId}/membres/{membreId}/transfert:
    post:
      tags:
        - Membres
      summary: Transférer un membre vers une autre collectivité
      description: Permet à un membre de changer de collectivité (ex. changement de ville)
      operationId: transferMember
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
        - $ref: '#/components/parameters/MembreId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - nouvelleCollectiviteId
              properties:
                nouvelleCollectiviteId:
                  type: integer
                  format: int32
                  description: ID de la nouvelle collectivité cible.
                  example: 3
      responses:
        '200':
          description: Transfert effectué avec succès
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Membre'
        '400':
          description: Transfert invalide
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Collectivité ou membre introuvable.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Erreur interne du serveur.
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /collectivites/{collectiviteId}/cotisations:
    post:
      tags:
        - C - Cotisation et paiements
      summary: "Enregistrer une cotisation"
      description:
        Le trésorier de la collectivité garde une trace écrite du montant, 
        de la date de l'encaissement et du mode de paiement (espèce, virement bancaire ou mobile money).
      operationId: createCotisation
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: "ID de la collectivité"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCotisation'
      responses:
        '201':
          description: "Cotisation enregistrée avec succès"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
        '400':
          description: "Données invalides"
        '404':
          description: "Collectivité ou membre non trouvé"
    get:
      tags:
        - C - Cotisation et paiements
      summary: "Lister les cotisations d'une collectivité"
      description: "Retourne l'historique des encaissements pour une collectivité donnée"
      operationId: getCotisationsByCollectivite
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: "Date de début de période"
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: "Date de fin de période"
        - name: typeCotisation
          in: query
          schema:
            $ref: '#/components/schemas/TypeCotisation'
          description: "Filtrer par type de cotisation"
      responses:
        '200':
          description: "Liste des cotisations"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cotisation'

  /collectivites/{collectiviteId}/cotisations/{cotisationId}:
    get:
      tags:
        - C - Cotisation et paiements
      summary: "Détail d'une cotisation"
      operationId: getCotisationById
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: cotisationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: "Détail de la cotisation"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
        '404':
          description: "Cotisation non trouvée"

  /federation/reversements:
    post:
      tags:
        - C - Cotisation et paiements
      summary: "Enregistrer un reversement à la fédération"
      description: |
        Un pourcentage des cotisations périodiques est reversé à la fédération.
        La valeur du pourcentage est à déterminer.
      operationId: createReversement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReversement'
      responses:
        '201':
          description: "Reversement enregistré"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reversement'

  /collectivites/{collectiviteId}/reversements:
    get:
      tags:
        - C - Cotisation et paiements
      summary: "Historique des reversements d'une collectivité"
      description: "Liste tous les reversements effectués par une collectivité vers la fédération"
      operationId: getReversementsByCollectivite
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: "Liste des reversements"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reversement'

  /collectivites/{collectiviteId}/comptes:
    post:
      tags:
        - D - Situation de trésorerie
      summary: "Créer un compte pour une collectivité"
      description: |
        Une collectivité ne peut avoir qu'un seul compte de type caisse.
        Elle peut avoir plusieurs comptes bancaires ou plusieurs comptes mobile money.
        Compte bancaire : nécessite nom titulaire, banque, numéro à 23 chiffres (format BBBBB GGGGG CCCCCCCCCCC KK)
        Compte mobile money : nécessite nom titulaire, service (Orange Money, Mvola, Airtel Money), numéro téléphone unique
      operationId: createCompteForCollectivite
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompte'
      responses:
        '201':
          description: "Compte créé avec succès"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '400':
          description: "Données invalides ou caisse déjà existante"
    get:
      tags:
        - D - Situation de trésorerie
      summary: "Lister les comptes d'une collectivité"
      description: "Retourne la liste des comptes (caisse, bancaires, mobile money) d'une collectivité"
      operationId: getComptesByCollectivite
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: typeCompte
          in: query
          schema:
            $ref: '#/components/schemas/TypeCompte'
          description: "Filtrer par type de compte"
      responses:
        '200':
          description: "Liste des comptes"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'

  /federation/comptes:
    post:
      tags:
        - D - Situation de trésorerie
      summary: "Créer un compte pour la fédération"
      description: |
        La fédération applique le même principe : une seule caisse et plusieurs comptes bancaires ou mobile money.
      operationId: createCompteForFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompte'
      responses:
        '201':
          description: "Compte fédération créé"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
    get:
      tags:
        - D - Situation de trésorerie
      summary: "Lister les comptes de la fédération"
      operationId: getComptesFederation
      parameters:
        - name: typeCompte
          in: query
          schema:
            $ref: '#/components/schemas/TypeCompte'
      responses:
        '200':
          description: "Liste des comptes"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'

  /comptes/{compteId}/solde:
    get:
      tags:
        - D - Situation de trésorerie
      summary: "Consulter le solde d'un compte à une date donnée"
      description: "Pour chaque compte (caisse, bancaire, mobile money), retourne le solde à une date donnée. La devise est par défaut l'Ariary (MGA)."
      operationId: getSoldeCompte
      parameters:
        - name: compteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: "Date du solde (par défaut : date courante)"
      responses:
        '200':
          description: "Solde du compte"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoldeResponse'
        '404':
          description: "Compte non trouvé"

  /collectivites/{collectiviteId}/tresorerie:
    get:
      tags:
        - D - Situation de trésorerie
      summary: "Voir la trésorerie globale d'une collectivité"
      description: |
        La collectivité doit être transparente envers ses membres ainsi qu'envers la fédération.
        Retourne la somme des soldes de tous ses comptes (caisse + bancaires + mobile money).
      operationId: getTresorerieCollectivite
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: "Date de calcul de la trésorerie"
      responses:
        '200':
          description: "Trésorerie globale"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TresorerieResponse'

  /federation/tresorerie:
    get:
      tags:
        - D - Situation de trésorerie
      summary: "Voir la trésorerie de la fédération"
      description: "Retourne la somme des soldes de tous les comptes de la fédération"
      operationId: getTresorerieFederation
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: "Trésorerie fédération"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TresorerieResponse'

  /collectivites/{collectiviteId}/statistiques/membres:
    get:
      tags:
        - G - Statistiques d’une collectivité
      summary: "Statistiques détaillées des membres actifs d’une collectivité"
      description: |
        Pour le président de la collectivité. Retourne pour chaque membre actif (n’ayant pas démissionné) :
        - Le taux d’assiduité sur une période donnée
        - Le montant d’encaissement sur une période donnée
        - Le montant impayé potentiel sur une période donnée
      operationId: getStatistiquesMembres
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: "ID de la collectivité"
        - name: dateDebut
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "Date de début de la période (inclusive)"
          example: "2026-03-01"
        - name: dateFin
          in: query
          required: true
          schema:
            type: string
            format: date
          description: "Date de fin de la période (inclusive)"
          example: "2026-03-31"
      responses:
        '200':
          description: "Liste des statistiques par membre actif"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StatistiquesMembre'
                example:
                  - membreId: 5
                    nom: "Rakoto"
                    prenom: "Jean"
                    tauxAssiduite: 85.5
                    montantEncaissement: 150000
                    montantImpayePotentiel: 50000
                  - membreId: 12
                    nom: "Rabe"
                    prenom: "Marie"
                    tauxAssiduite: 92.0
                    montantEncaissement: 200000
                    montantImpayePotentiel: 0
        '400':
          description: "Paramètres invalides (dates manquantes ou incohérentes)"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: "Les dates de début et de fin sont requises et doivent être cohérentes."
        '404':
          description: "Collectivité non trouvée"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: "Aucune collectivité trouvée avec l'ID spécifié."
        '500':
          description: "Erreur interne du serveur"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /collectivites/{collectiviteId}/rapport-mensuel:
    get:
      tags:
        - G - Statistiques d’une collectivité
      summary: "Rapport mensuel d’une collectivité pour la fédération"
      description: |
        Le président de la collectivité doit faire un rapport mensuel à la fédération contenant :
        - Le taux d’assiduité global de la collectivité
        - Le nombre de membres actifs (n’ayant pas démissionné)
      operationId: getRapportMensuelCollectivite
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: "ID de la collectivité"
        - name: mois
          in: query
          required: true
          schema:
            type: integer
            minimum: 1
            maximum: 12
          description: "Mois du rapport (1 = janvier, 12 = décembre)"
          example: 3
        - name: annee
          in: query
          required: true
          schema:
            type: integer
            minimum: 2000
          description: "Année du rapport"
          example: 2026
      responses:
        '200':
          description: "Rapport mensuel de la collectivité"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RapportMensuelCollectivite'
              example:
                collectiviteId: 1
                nomCollectivite: "Collectivité Rizicole d'Ambatondrazaka"
                mois: 3
                annee: 2026
                nombreMembresActifs: 45
                tauxAssiduiteGlobal: 78.3
        '400':
          description: "Paramètres invalides (mois ou année manquants)"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: "Le mois et l'année sont requis."
        '404':
          description: "Collectivité non trouvée"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: "Aucune collectivité trouvée avec l'ID spécifié."
        '500':
          description: "Erreur interne du serveur"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
