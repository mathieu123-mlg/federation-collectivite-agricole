openapi: 3.1.0
info:
  title: Fédération de collectivités agricoles
  version: 1.0.0
servers:
  - url: 'http://localhost:8080'
tags:
  - name: Collectivités agricoles
    description: "A - Ouverture et gestion des collectivités agricoles"
components:
  parameters:
    CollectiviteId:
      name: id
      in: path
      description: "ID de la collectivité agricole"
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1
        example: 1
  schemas:
    SpecialiteAgricole:
      type: string
      description: "Spécialité agricole de la collectivité"
      enum:
        - RIZICULTURE
        - MARAICHAGE
        - ELEVAGE
        - ARBORICULTURE
        - PECHE
        - AUTRE
      example: RIZICULTURE
    Collectivite:
      type: object
      required:
        - id
        - numero
        - nom
        - ville
        - specialite
        - dateCreation
        - nombreMembres
      properties:
        id:
          type: integer
          format: int32
          description: "Identifiant unique de la collectivité"
          example: 1
        numero:
          type: string
          description: "Numéro d'identification de la collectivité"
          example: "CA-001"
        nom:
          type: string
          description: "Nom de la collectivité"
          example: "Collectivité Rizicole d'Ambatondrazaka"
        ville:
          type: string
          description: "Ville où se situe la collectivité"
          example: "Ambatondrazaka"
        specialite:
          $ref: '#/components/schemas/SpecialiteAgricole'
        dateCreation:
          type: string
          format: date
          description: "Date de création de la collectivité"
          example: "2020-04-15"
        nombreMembres:
          type: integer
          description: "Nombre de membres dans la collectivité"
          minimum: 10
          example: 50
    CreateCollectivite:
      type: object
      required:
        - nom
        - ville
        - specialite
      properties:
        nom:
          type: string
          description: "Nom de la collectivité"
          example: "Collectivité Maraîchère de Toamasina"
        ville:
          type: string
          description: "Ville où se situe la collectivité"
          example: "Toamasina"
        specialite:
          $ref: '#/components/schemas/SpecialiteAgricole'
    ErrorResponse:
          type: string
          description: "Message d'erreur en cas de problème lors de la création de la collectivité"
          example: "Le nom de la collectivité est requis."

    TypeCotisation:
      type: string
      enum: [MENSUELLE, ANNUELLE, PONCTUELLE]
      description: "Cotisation périodique (mensuelle/annuelle) ou ponctuelle pour événement spécifique ou imprévu"
      example: MENSUELLE

    ModePaiement:
      type: string
      enum: [ESPECE, VIREMENT_BANCAIRE, MOBILE_MONEY]
      description: "Mode de paiement : espèce, virement bancaire ou mobile money"
      example: MOBILE_MONEY

    Cotisation:
      type: object
      required:
        - id
        - collectivite
        - membre
        - montant
        - dateEncaissement
        - modePaiement
        - typeCotisation
      properties:
        id:
          type: integer
          format: int64
          description: "Identifiant unique de la cotisation"
          example: 1
        collectivite:
          $ref: '#/components/schemas/Collectivite'
          description: "Collectivité concernée"
        membre:
          $ref: '#/components/schemas/Membre'
          description: "Membre ayant effectué le paiement"
        montant:
          type: integer
          minimum: 1
          description: "Montant de la cotisation en MGA"
          example: 50000
        dateEncaissement:
          type: string
          format: date
          description: "Date de l'encaissement (trace écrite obligatoire)"
          example: "2026-04-16"
        modePaiement:
          $ref: '#/components/schemas/ModePaiement'
        typeCotisation:
          $ref: '#/components/schemas/TypeCotisation'

    CreateCotisation:
      type: object
      required:
        - membreId
        - montant
        - modePaiement
        - typeCotisation
      properties:
        membreId:
          type: integer
          format: int64
          description: "ID du membre qui paie la cotisation"
        montant:
          type: integer
          minimum: 1
        modePaiement:
          $ref: '#/components/schemas/ModePaiement'
        typeCotisation:
          $ref: '#/components/schemas/TypeCotisation'

    CreateReversement:
      type: object
      required:
        - collectiviteId
        - montant
        - pourcentageApplied
      properties:
        collectiviteId:
          type: integer
          format: int64
        montant:
          type: integer
        pourcentageApplied:
          type: number
          format: float

    Reversement:
      type: object
      required:
        - id
        - collectivite
        - montant
        - dateReversement
        - pourcentageApplied
      properties:
        id:
          type: integer
          format: int64
          description: "Identifiant unique du reversement"
        collectivite:
          $ref: '#/components/schemas/Collectivite'
          description: "Collectivité qui reverse à la fédération"
        montant:
          type: integer
          description: "Montant reversé en MGA"
        dateReversement:
          type: string
          format: date
          description: "Date du reversement"
        pourcentageApplied:
          type: number
          format: float
          description: "Pourcentage des cotisations périodiques reversé à la fédération (valeur à déterminer)"

    Membre:
      type: object
      properties:
        id:
          type: number
          example: 1
        nom:
          type: string
        prenom:
          type: string
        anniversaire:
          type: string
        genre:
          $ref: '#/components/schemas/Genre'
        adresse:
          type: string
        metier:
          $ref: '#/components/schemas/Metier'
        telephone:
          type: string
        email:
          type: string
        date_adhesion:
          type: string
        post:
          $ref: '#/components/schemas/Poste'

    Genre:
      type: object
      enum:
        - feminin
        - masculin

    Poste:
      enum:
        - president
        - president_adjoint
        - treasury
        - secretary
        - confirmed_member
        - junior_member

    Metier:
      type: object
      enum:
        - collecteur
        - pruducteur

    TypeCompte:
      type: string
      enum: [CAISSE, BANCAIRE, MOBILE_MONEY]
      description: "Type de compte : caisse (unique), bancaire ou mobile money"
      example: BANCAIRE

    Banque:
      type: string
      enum: [BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM]
      description: "Nom de la banque pour un compte bancaire"

    ServiceMobileMoney:
      type: string
      enum: [ORANGE_MONEY, MVOLA, AIRTEL_MONEY]
      description: "Service mobile money"

    Compte:
      type: object
      required:
        - id
        - entite
        - typeEntite
        - typeCompte
        - titulaire
        - solde
        - devise
      properties:
        id:
          type: integer
          format: int64
          description: "Identifiant unique du compte"
        entite:
          type: object
          required:
            - id
            - nom
          properties:
            id:
              type: integer
              format: int64
            nom:
              type: string
          description: "Collectivité ou fédération propriétaire du compte"
        typeEntite:
          type: string
          enum: [COLLECTIVITE, FEDERATION]
          description: "Type d'entité propriétaire"
        typeCompte:
          $ref: '#/components/schemas/TypeCompte'
        titulaire:
          type: string
          description: "Nom du titulaire du compte"
        solde:
          type: integer
          description: "Solde actuel du compte en MGA à une date donnée"
          example: 1500000
        devise:
          type: string
          default: "MGA"
          description: "Devise du compte (Ariary par défaut)"
        banque:
          $ref: '#/components/schemas/Banque'
        numeroCompte:
          type: string
          description: "Format BBBBB GGGGG CCCCCCCCCCC KK (23 chiffres)"
          example: "12345 67890 12345678901 12"
        serviceMobileMoney:
          $ref: '#/components/schemas/ServiceMobileMoney'
        numeroTelephone:
          type: string
          description: "Numéro de téléphone unique associé au compte mobile money"
          example: "0321234567"

    CreateCompte:
      type: object
      required:
        - typeCompte
        - titulaire
      properties:
        typeCompte:
          $ref: '#/components/schemas/TypeCompte'
        titulaire:
          type: string
          description: "Nom du titulaire du compte"
        banque:
          $ref: '#/components/schemas/Banque'
        numeroCompte:
          type: string
          description: "Format BBBBB GGGGG CCCCCCCCCCC KK"
        serviceMobileMoney:
          $ref: '#/components/schemas/ServiceMobileMoney'
        numeroTelephone:
          type: string

    SoldeResponse:
      type: object
      required:
        - compteId
        - solde
        - date
        - devise
      properties:
        compteId:
          type: integer
          format: int64
        solde:
          type: integer
          description: "Solde du compte à la date donnée"
        date:
          type: string
          format: date
          description: "Date à laquelle le solde est consulté"
        devise:
          type: string
          example: "MGA"

    TresorerieResponse:
      type: object
      required:
        - entite
        - typeEntite
        - soldeTotal
        - dateCalcul
        - comptes
      properties:
        entite:
          type: object
          properties:
            id:
              type: integer
            nom:
              type: string
        typeEntite:
          type: string
          enum: [COLLECTIVITE, FEDERATION]
        soldeTotal:
          type: integer
          description: "Somme des soldes de tous les comptes (caisse + bancaires + mobile money)"
        dateCalcul:
          type: string
          format: date
        comptes:
          type: array
          items:
            $ref: '#/components/schemas/Compte'

    UpdateSoldeRequest:
      type: object
      required:
        - montantVariation
        - motif
      properties:
        montantVariation:
          type: integer
          description: "Positif pour ajout (encaissement), négatif pour retrait (dépense)"
          example: 50000
        motif:
          type: string
          description: "Raison de la variation (ex: cotisation mensuelle, dépense activité)"
          example: "Cotisation mensuelle membre Dupont"

paths:
  /collectivites:
    get:
      tags:
        - Collectivités
      summary: "Lister toutes les collectivités"
      description: "Retourne ka liste de toutes les collectivités de la fédération"
      operationId: getCollectivites
      responses:
        '200':
          description: "Liste des collectivités"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivite'
                example:
                  - id: 1
                    numero: "CA-001"
                    nom: "Collectivité Rizicole d'Ambatondrazaka"
                    ville: "Ambatondrazaka"
                    specialite: RIZICULTURE
                    dateCreation: "2020-04-15"
                    nombreMembres: 50
                  - id: 2
                    numero: "CA-002"
                    nom: "Collectivité Maraîchère de Toamasina"
                    ville: "Toamasina"
                    specialite: MARAICHAGE
                    dateCreation: "2021-06-20"
                    nombreMembres: 30
        '500':
          description: "Erreur interne du serveur"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Collectivités
      summary: Ouvrir une nouvelle collectivité
      description: "Crée une nouvelle collectivité agricole. La fédération valide les conditions
        d'ouverture (au moins 10 membres avec 5 membres ayant6 mois d'ancienneté, postes spécifiques
        pourvus, autorisation formelle accordée)."
      operationId: createCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectivite'
      responses:
        '201':
          description: "Collectivité créée avec succès"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
              example:
                id: 3
                numero: "CA-003"
                nom: "Collectivité Arboricole de Fianarantsoa"
                ville: "Fianarantsoa"
                specialite: ARBORICULTURE
                dateCreation: "2022-01-10"
                nombreMembres: 15
        '400':
          description: "Requête invalide - conditions d'ouverture non remplies ou données manquantes"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: "Le nombre de membres doit être d'au moins 10, avec au moins 5 membres ayant au moins 6 mois d'ancienneté."
        '500':
          description: "Erreur interne du serveur"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: "Une erreur est survenue lors du traitement de la demande."
  /collectivites/{CollectiviteId}:
    get:
      tags:
        - Collectivités
      summary: "Obtenir une collectivité par son ID"
      description: "Retourne les détails d'une collectivité spécifique en fonction de son ID."
      operationId: getCollectiviteById
      parameters:
        - $ref: '#/components/parameters/CollectiviteId'
      responses:
        '200':
          description: "Collectivité trouvée"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
              example:
                id: 1
                numero: "CA-001"
                nom: "Collectivité Rizicole d'Ambatondrazaka"
                ville: "Ambatondrazaka"
                specialite: RIZICULTURE
                dateCreation: "2020-04-15"
                nombreMembres: 50
        '404':
          description: "Collectivité non trouvée"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: "Aucune collectivité trouvée avec l'ID spécifié."
        '500':
          description: "Erreur interne du serveur"
          content:
            text/plain:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example: "Une erreur est survenue lors du traitement de la demande."

  /collectivites/{collectiviteId}/cotisations:
    post:
      tags:
        - C - Cotisation et paiements
      summary: "Enregistrer une cotisation"
      description:
        Le trésorier de la collectivité garde une trace écrite du montant, 
        de la date de l'encaissement et du mode de paiement (espèce, virement bancaire ou mobile money).
      operationId: createCotisation
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: "ID de la collectivité"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCotisation'
      responses:
        '201':
          description: "Cotisation enregistrée avec succès"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
        '400':
          description: "Données invalides"
        '404':
          description: "Collectivité ou membre non trouvé"
    get:
      tags:
        - C - Cotisation et paiements
      summary: "Lister les cotisations d'une collectivité"
      description: "Retourne l'historique des encaissements pour une collectivité donnée"
      operationId: getCotisationsByCollectivite
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: startDate
          in: query
          schema:
            type: string
            format: date
          description: "Date de début de période"
        - name: endDate
          in: query
          schema:
            type: string
            format: date
          description: "Date de fin de période"
        - name: typeCotisation
          in: query
          schema:
            $ref: '#/components/schemas/TypeCotisation'
          description: "Filtrer par type de cotisation"
      responses:
        '200':
          description: "Liste des cotisations"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cotisation'

  /collectivites/{collectiviteId}/cotisations/{cotisationId}:
    get:
      tags:
        - C - Cotisation et paiements
      summary: "Détail d'une cotisation"
      operationId: getCotisationById
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: cotisationId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: "Détail de la cotisation"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cotisation'
        '404':
          description: "Cotisation non trouvée"

  /federation/reversements:
    post:
      tags:
        - C - Cotisation et paiements
      summary: "Enregistrer un reversement à la fédération"
      description: |
        Un pourcentage des cotisations périodiques est reversé à la fédération.
        La valeur du pourcentage est à déterminer.
      operationId: createReversement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReversement'
      responses:
        '201':
          description: "Reversement enregistré"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Reversement'

  /collectivites/{collectiviteId}/reversements:
    get:
      tags:
        - C - Cotisation et paiements
      summary: "Historique des reversements d'une collectivité"
      description: "Liste tous les reversements effectués par une collectivité vers la fédération"
      operationId: getReversementsByCollectivite
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: "Liste des reversements"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Reversement'

  /collectivites/{collectiviteId}/comptes:
    post:
      tags:
        - D - Situation de trésorerie
      summary: "Créer un compte pour une collectivité"
      description: |
        Une collectivité ne peut avoir qu'un seul compte de type caisse.
        Elle peut avoir plusieurs comptes bancaires ou plusieurs comptes mobile money.
        Compte bancaire : nécessite nom titulaire, banque, numéro à 23 chiffres (format BBBBB GGGGG CCCCCCCCCCC KK)
        Compte mobile money : nécessite nom titulaire, service (Orange Money, Mvola, Airtel Money), numéro téléphone unique
      operationId: createCompteForCollectivite
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompte'
      responses:
        '201':
          description: "Compte créé avec succès"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
        '400':
          description: "Données invalides ou caisse déjà existante"
    get:
      tags:
        - D - Situation de trésorerie
      summary: "Lister les comptes d'une collectivité"
      description: "Retourne la liste des comptes (caisse, bancaires, mobile money) d'une collectivité"
      operationId: getComptesByCollectivite
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: typeCompte
          in: query
          schema:
            $ref: '#/components/schemas/TypeCompte'
          description: "Filtrer par type de compte"
      responses:
        '200':
          description: "Liste des comptes"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'

  /federation/comptes:
    post:
      tags:
        - D - Situation de trésorerie
      summary: "Créer un compte pour la fédération"
      description: |
        La fédération applique le même principe : une seule caisse et plusieurs comptes bancaires ou mobile money.
      operationId: createCompteForFederation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCompte'
      responses:
        '201':
          description: "Compte fédération créé"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Compte'
    get:
      tags:
        - D - Situation de trésorerie
      summary: "Lister les comptes de la fédération"
      operationId: getComptesFederation
      parameters:
        - name: typeCompte
          in: query
          schema:
            $ref: '#/components/schemas/TypeCompte'
      responses:
        '200':
          description: "Liste des comptes"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Compte'

  /comptes/{compteId}/solde:
    get:
      tags:
        - D - Situation de trésorerie
      summary: "Consulter le solde d'un compte à une date donnée"
      description: "Pour chaque compte (caisse, bancaire, mobile money), retourne le solde à une date donnée. La devise est par défaut l'Ariary (MGA)."
      operationId: getSoldeCompte
      parameters:
        - name: compteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: "Date du solde (par défaut : date courante)"
      responses:
        '200':
          description: "Solde du compte"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SoldeResponse'
        '404':
          description: "Compte non trouvé"

  /collectivites/{collectiviteId}/tresorerie:
    get:
      tags:
        - D - Situation de trésorerie
      summary: "Voir la trésorerie globale d'une collectivité"
      description: |
        La collectivité doit être transparente envers ses membres ainsi qu'envers la fédération.
        Retourne la somme des soldes de tous ses comptes (caisse + bancaires + mobile money).
      operationId: getTresorerieCollectivite
      parameters:
        - name: collectiviteId
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: date
          in: query
          schema:
            type: string
            format: date
          description: "Date de calcul de la trésorerie"
      responses:
        '200':
          description: "Trésorerie globale"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TresorerieResponse'

  /federation/tresorerie:
    get:
      tags:
        - D - Situation de trésorerie
      summary: "Voir la trésorerie de la fédération"
      description: "Retourne la somme des soldes de tous les comptes de la fédération"
      operationId: getTresorerieFederation
      parameters:
        - name: date
          in: query
          schema:
            type: string
            format: date
      responses:
        '200':
          description: "Trésorerie fédération"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TresorerieResponse'