openapi: 3.1.0
info:
  title: Fédération de collectivités agricoles
  version: 1.0.0
servers:
  - url: 'http://localhost:8080'
tags:
  - name: Collectivités
    description: "A - Ouverture et gestion des collectivités agricoles"
  - name: Membres
    description: "B - Gestion des membres et de leur adhésion"
  - name: C - Cotisation et paiements
  - name: D - Situation de trésorerie
  - name: E - Activités
  - name: F - Assiduité
  - name: G - Statistiques d’une collectivité
  - name: H - Statistiques de la fédération
components:
  parameters:
    CollectiviteId:
      name: id
      in: path
      description: "ID de la collectivité agricole"
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1
        example: 1
    MembreId:
      name: membreId
      in: path
      description: "ID d'un membre d'une collectivité agricole"
      required: true
      schema:
        type: integer
        format: int32
        minimum: 1
      example: 1

  schemas:
    SpecialiteAgricole:
      type: string
      description: "Spécialité agricole de la collectivité"
      enum:
        - RIZICULTURE
        - MARAICHAGE
        - ELEVAGE
        - ARBORICULTURE
        - PECHE
        - AUTRE
      example: RIZICULTURE
    Collectivite:
      type: object
      required:
        - id
        - numero
        - nom
        - ville
        - specialite
        - dateCreation
        - nombreMembres
      properties:
        id:
          type: integer
          format: int32
          description: "Identifiant unique de la collectivité"
          example: 1
        numero:
          type: string
          description: "Numéro d'identification de la collectivité"
          example: "CA-001"
        nom:
          type: string
          description: "Nom de la collectivité"
          example: "Collectivité Rizicole d'Ambatondrazaka"
        ville:
          type: string
          description: "Ville où se situe la collectivité"
          example: "Ambatondrazaka"
        specialite:
          $ref: '#/components/schemas/SpecialiteAgricole'
        dateCreation:
          type: string
          format: date
          description: "Date de création de la collectivité"
          example: "2020-04-15"
        nombreMembres:
          type: integer
          description: "Nombre de membres dans la collectivité"
          minimum: 10
          example: 50
    CreateCollectivite:
      type: object
      required:
        - nom
        - ville
        - specialite
      properties:
        nom:
          type: string
          description: "Nom de la collectivité"
          example: "Collectivité Maraîchère de Toamasina"
        ville:
          type: string
          description: "Ville où se situe la collectivité"
          example: "Toamasina"
        specialite:
          $ref: '#/components/schemas/SpecialiteAgricole'
    ErrorResponse:
      type: string
      description: "Message d'erreur en cas de problème lors de la création de la collectivité"
      example: "Le nom de la collectivité est requis."

    TypeCotisation:
      type: string
      enum: [ MENSUELLE, ANNUELLE, PONCTUELLE ]
      description: "Cotisation périodique (mensuelle/annuelle) ou ponctuelle pour événement spécifique ou imprévu"
      example: MENSUELLE

    ModePaiement:
      type: string
      enum: [ ESPECE, VIREMENT_BANCAIRE, MOBILE_MONEY ]
      description: "Mode de paiement : espèce, virement bancaire ou mobile money"
      example: MOBILE_MONEY

    Cotisation:
      type: object
      required:
        - id
        - collectivite
        - membre
        - montant
        - dateEncaissement
        - modePaiement
        - typeCotisation
      properties:
        id:
          type: integer
          format: int64
          description: "Identifiant unique de la cotisation"
          example: 1
        collectivite:
          $ref: '#/components/schemas/Collectivite'
          description: "Collectivité concernée"
        membre:
          $ref: '#/components/schemas/Membre'
          description: "Membre ayant effectué le paiement"
        montant:
          type: integer
          minimum: 1
          description: "Montant de la cotisation en MGA"
          example: 50000
        dateEncaissement:
          type: string
          format: date
          description: "Date de l'encaissement (trace écrite obligatoire)"
          example: "2026-04-16"
        modePaiement:
          $ref: '#/components/schemas/ModePaiement'
        typeCotisation:
          $ref: '#/components/schemas/TypeCotisation'

    CreateCotisation:
      type: object
      required:
        - membreId
        - montant
        - modePaiement
        - typeCotisation
      properties:
        membreId:
          type: integer
          format: int64
          description: "ID du membre qui paie la cotisation"
        montant:
          type: integer
          minimum: 1
        modePaiement:
          $ref: '#/components/schemas/ModePaiement'
        typeCotisation:
          $ref: '#/components/schemas/TypeCotisation'

    CreateReversement:
      type: object
      required:
        - collectiviteId
        - montant
        - pourcentageApplied
      properties:
        collectiviteId:
          type: integer
          format: int64
        montant:
          type: integer
        pourcentageApplied:
          type: number
          format: float

    Reversement:
      type: object
      required:
        - id
        - collectivite
        - montant
        - dateReversement
        - pourcentageApplied
      properties:
        id:
          type: integer
          format: int64
          description: "Identifiant unique du reversement"
        collectivite:
          $ref: '#/components/schemas/Collectivite'
          description: "Collectivité qui reverse à la fédération"
        montant:
          type: integer
          description: "Montant reversé en MGA"
        dateReversement:
          type: string
          format: date
          description: "Date du reversement"
        pourcentageApplied:
          type: number
          format: float
          description: "Pourcentage des cotisations périodiques reversé à la fédération (valeur à déterminer)"

    Membre:
      type: object
      properties:
        id:
          type: number
          example: 1
        nom:
          type: string
        prenom:
          type: string
        anniversaire:
          type: string
        genre:
          $ref: '#/components/schemas/Genre'
        adresse:
          type: string
          description: "Adresse du membre"
          example: "Lot II J 45, Antananarivo"
        metier:
          type: string
          description: "Métier du membre en dehors de la collectivité"
          example: "Agriculteur"
        telephone:
          type: string
          description: "Numéro de téléphone du membre"
          example: "+261 34 12 345 67"
        email:
          type: string
          format: email
          description: "Adresse email du membre"
          example: "rasolojean@gmail.com"
        dateAdhesion:
          type: string
          format: date
          description: "Date d'adhésion du membre à la collectivité"
          example: "2020-01-15"
        poste:
          $ref: '#/components/schemas/Poste'


      Genre:
        type: string
        description: "Genre d'un membre"
        enum:
          - MASCULIN
          - FEMININ
          - AUTRE
        example: MASCULIN
      Poste:
        type: string
        description: "Poste occupé par un membre au sein d'une collectivité"
        enum:
          - PRESIDENT
          - VICE_PRESIDENT
          - SECRETAIRE
          - TRESORIER
          - MEMBRE_CONFIRME
          - MEMBRE_JUNIOR
        example: PRESIDENT
      Membre:
        type: object
        required:
          - id
          - nom
          - prenom
          - dateNaissance
          - genre
          - adresse
          - metier
          - telephone
          - email
          - dateAdhesion
          - poste
        properties:
          id:
            type: integer
            format: int32
            description: "Identifiant unique du membre"
            example: 1
          nom:
            type: string
            description: "Nom de famille du membre"
            example: "Rasolo"
          prenom:
            type: string
            description: "Prénom du membre"
            example: "Jean"
          dateNaissance:
            type: string
            format: date
            description: "Date de naissance du membre"
            example: "1985-07-20"
          genre:
            $ref: '#/components/schemas/Genre'
          adresse:
            type: string
            description: "Adresse du membre"
            example: "Lot II J 45, Antananarivo"
          metier:
            type: string
            description: "Métier du membre en dehors de la collectivité"
            example: "Agriculteur"
          telephone:
            type: string
            description: "Numéro de téléphone du membre"
            example: "+261 34 12 345 67"
          email:
            type: string
            format: email
            description: "Adresse email du membre"
            example: "rasolojean@gmail.com"
          dateAdhesion:
            type: string
            format: date
            description: "Date d'adhésion du membre à la collectivité"
            example: "2020-01-15"
          poste:
            $ref: '#/components/schemas/Poste'
      CreateMembre:
        type: object
        required:
          - nom
          - prenom
          - dateNaissance
          - genre
          - adresse
          - metier
          - telephone
          - email
          - idParrain
        properties:
          nom:
            type: string
            example: "Andrianarisoa"
          prenom:
            type: string
            example: "Marie"
          dateNaissance:
            type: string
            format: date
            example: "1990-03-10"
          genre:
            $ref: '#/components/schemas/Genre'
          adresse:
            type: string
            example: "Lot IV A 12, Toamasina"
          metier:
            type: string
            example: "Commerçante"
          telephone:
            type: string
            example: "+261 33 12 345 67"
          email:
            type: string
            format: email
            example: "marie93@gmail.com"
          idParrain:
            type: integer
            format: int32
            description: Identifiant du membre confirmé parrain (ancienneté > 90 jours requise).
            example: 4
    CreateMembre:
      type: object
      required:
        - nom
        - prenom
        - dateNaissance
        - genre
        - adresse
        - metier
        - telephone
        - email
        - idParrain
      properties:
        nom:
          type: string
          example: "Andrianarisoa"
        prenom:
          type: string
          example: "Marie"
        dateNaissance:
          type: string
          format: date
          example: "1990-03-10"
        genre:
          $ref: '#/components/schemas/Genre'
        adresse:
          type: string
          example: "Lot IV A 12, Toamasina"
        metier:
          type: string
          example: "Commerçante"
        telephone:
          type: string
          example: "+261 33 12 345 67"
        email:
          type: string
          format: email
          example: "marie93@gmail.com"
        idParrain:
          type: integer
          format: int32
          description: Identifiant du membre confirmé parrain (ancienneté > 90 jours requise).
          example: 4

    Genre:
      type: object
      enum:
        - feminin
        - masculin

    Poste:
      enum:
        - president
        - president_adjoint
        - treasury
        - secretary
        - confirmed_member
        - junior_member

    Metier:
      type: object
      enum:
        - collecteur
        - pruducteur

    TypeCompte:
      type: string
      enum: [ CAISSE, BANCAIRE, MOBILE_MONEY ]
      description: "Type de compte : caisse (unique), bancaire ou mobile money"
      example: BANCAIRE

    Banque:
      type: string
      enum: [ BRED, MCB, BMOI, BOA, BGFI, AFG, ACCES_BANQUE, BAOBAB, SIPEM ]
      description: "Nom de la banque pour un compte bancaire"

    ServiceMobileMoney:
      type: string
      enum: [ ORANGE_MONEY, MVOLA, AIRTEL_MONEY ]
      description: "Service mobile money"

    Compte:
      type: object
      required:
        - id
        - entite
        - typeEntite
        - typeCompte
        - titulaire
        - solde
        - devise
      properties:
        id:
          type: integer
          format: int64
          description: "Identifiant unique du compte"
        entite:
          type: object
          required:
            - id
            - nom
          properties:
            id:
              type: integer
              format: int64
            nom:
              type: string
          description: "Collectivité ou fédération propriétaire du compte"
        typeEntite:
          type: string
          enum: [ COLLECTIVITE, FEDERATION ]
          description: "Type d'entité propriétaire"
        typeCompte:
          $ref: '#/components/schemas/TypeCompte'
        titulaire:
          type: string
          description: "Nom du titulaire du compte"
        solde:
          type: integer
          description: "Solde actuel du compte en MGA à une date donnée"
          example: 1500000
        devise:
          type: string
          default: "MGA"
          description: "Devise du compte (Ariary par défaut)"
        banque:
          $ref: '#/components/schemas/Banque'
        numeroCompte:
          type: string
          description: "Format BBBBB GGGGG CCCCCCCCCCC KK (23 chiffres)"
          example: "12345 67890 12345678901 12"
        serviceMobileMoney:
          $ref: '#/components/schemas/ServiceMobileMoney'
        numeroTelephone:
          type: string
          description: "Numéro de téléphone unique associé au compte mobile money"
          example: "0321234567"

    CreateCompte:
      type: object
      required:
        - typeCompte
        - titulaire
      properties:
        typeCompte:
          $ref: '#/components/schemas/TypeCompte'
        titulaire:
          type: string
          description: "Nom du titulaire du compte"
        banque:
          $ref: '#/components/schemas/Banque'
        numeroCompte:
          type: string
          description: "Format BBBBB GGGGG CCCCCCCCCCC KK"
        serviceMobileMoney:
          $ref: '#/components/schemas/ServiceMobileMoney'
        numeroTelephone:
          type: string

    SoldeResponse:
      type: object
      required:
        - compteId
        - solde
        - date
        - devise
      properties:
        compteId:
          type: integer
          format: int64
        solde:
          type: integer
          description: "Solde du compte à la date donnée"
        date:
          type: string
          format: date
          description: "Date à laquelle le solde est consulté"
        devise:
          type: string
          example: "MGA"

    TresorerieResponse:
      type: object
      required:
        - entite
        - typeEntite
        - soldeTotal
        - dateCalcul
        - comptes
      properties:
        entite:
          type: object
          properties:
            id:
              type: integer
            nom:
              type: string
        typeEntite:
          type: string
          enum: [ COLLECTIVITE, FEDERATION ]
        soldeTotal:
          type: integer
          description: "Somme des soldes de tous les comptes (caisse + bancaires + mobile money)"
        dateCalcul:
          type: string
          format: date
        comptes:
          type: array
          items:
            $ref: '#/components/schemas/Compte'

    UpdateSoldeRequest:
      type: object
      required:
        - montantVariation
        - motif
      properties:
        montantVariation:
          type: integer
          description: "Positif pour ajout (encaissement), négatif pour retrait (dépense)"
          example: 50000
        motif:
          type: string
          description: "Raison de la variation (ex: cotisation mensuelle, dépense activité)"
          example: "Cotisation mensuelle membre Dupont"

    StatistiquesMembre:
      type: object
      required:
        - membreId
        - nom
        - prenom
        - tauxAssiduite
        - montantEncaissement
        - montantImpayePotentiel
      properties:
        membreId:
          type: integer
          format: int32
          description: "ID du membre"
          example: 5
        nom:
          type: string
          description: "Nom du membre"
          example: "Rakoto"
        prenom:
          type: string
          description: "Prénom du membre"
          example: "Jean"
        tauxAssiduite:
          type: number
          format: float
          description: "Taux d’assiduité sur la période donnée (en pourcentage, de 0 à 100)"
          minimum: 0
          maximum: 100
          example: 85.5
        montantEncaissement:
          type: integer
          description: "Montant total encaissé par le membre sur la période (en MGA)"
          minimum: 0
          example: 150000
        montantImpayePotentiel:
          type: integer
          description: "Montant potentiel impayé par le membre sur la période (en MGA)"
          minimum: 0
          example: 50000

    RapportMensuelCollectivite:
      type: object
      required:
        - collectiviteId
        - nomCollectivite
        - mois
        - annee
        - nombreMembresActifs
        - tauxAssiduiteGlobal
      properties:
        collectiviteId:
          type: integer
          format: int32
          description: "ID de la collectivité"
          example: 1
        nomCollectivite:
          type: string
          description: "Nom de la collectivité"
          example: "Collectivité Rizicole d'Ambatondrazaka"
        mois:
          type: integer
          description: "Mois du rapport (1 = janvier, 12 = décembre)"
          minimum: 1
          maximum: 12
          example: 3
        annee:
          type: integer
          description: "Année du rapport"
          example: 2026
        nombreMembresActifs:
          type: integer
          description: "Nombre de membres actifs (n’ayant pas démissionné) dans la collectivité"
          minimum: 0
          example: 45
        tauxAssiduiteGlobal:
          type: number
          format: float
          description: "Taux d’assiduité global de la collectivité sur le mois (en pourcentage, de 0 à 100)"
          minimum: 0
          maximum: 100
          example: 78.3
    StatistiquesCollectivite:
      type: object
      required:
        - collectiviteId
        - nomCollectivite
        - ville
        - specialite
        - tauxAssiduiteGlobal
        - pourcentageMembresAJourCotisation
        - nombreNouveauxAdherents
        - nombreMembresActifs
      properties:
        collectiviteId:
          type: integer
          format: int32
          description: "ID de la collectivité"
          example: 1
        nomCollectivite:
          type: string
          description: "Nom de la collectivité"
          example: "Collectivité Rizicole d'Ambatondrazaka"
        ville:
          type: string
          description: "Ville de la collectivité"
          example: "Ambatondrazaka"
        specialite:
          $ref: '#/components/schemas/SpecialiteAgricole'
        tauxAssiduiteGlobal:
          type: number
          format: float
          description: "Taux d'assiduité global de la collectivité sur la période (en pourcentage, de 0 à 100)"
          minimum: 0
          maximum: 100
          example: 78.3
        pourcentageMembresAJourCotisation:
          type: number
          format: float
          description: "Pourcentage de membres à jour de leur cotisation sur la période (en pourcentage, de 0 à 100)"
          minimum: 0
          maximum: 100
          example: 85.5
        nombreNouveauxAdherents:
          type: integer
          description: "Nombre de nouveaux adhérents ayant rejoint la collectivité sur la période"
          minimum: 0
          example: 12
        nombreMembresActifs:
          type: integer
          description: "Nombre total de membres actifs dans la collectivité à la fin de la période"
          minimum: 0
          example: 45

    RapportGlobalFederation:
      type: object
      required:
        - periode
        - dateDebut
        - dateFin
        - dateEtablissement
        - nombreTotalCollectivites
        - nombreTotalMembresActifs
        - nombreTotalNouveauxAdherents
        - tauxAssiduiteMoyenFederation
        - pourcentageMoyenAJourCotisation
        - collectivites
        - collectiviteLaPlusMeritante
        - collectiviteAMeliorer
      properties:
        periode:
          type: string
          description: "Type de période (mensuel ou annuel)"
          enum:
            - MENSUEL
            - ANNUEL
          example: "MENSUEL"
        dateDebut:
          type: string
          format: date
          description: "Date de début de la période"
          example: "2026-03-01"
        dateFin:
          type: string
          format: date
          description: "Date de fin de la période"
          example: "2026-03-31"
        dateEtablissement:
          type: string
          format: date
          description: "Date d'établissement du rapport"
          example: "2026-04-05"
        nombreTotalCollectivites:
          type: integer
          description: "Nombre total de collectivités dans la fédération"
          example: 5
        nombreTotalMembresActifs:
          type: integer
          description: "Nombre total de membres actifs dans toute la fédération"
          example: 187
        nombreTotalNouveauxAdherents:
          type: integer
          description: "Nombre total de nouveaux adhérents sur la période dans toute la fédération"
          example: 42
        tauxAssiduiteMoyenFederation:
          type: number
          format: float
          description: "Taux d'assiduité moyen de toutes les collectivités (moyenne non pondérée)"
          minimum: 0
          maximum: 100
          example: 74.2
        pourcentageMoyenAJourCotisation:
          type: number
          format: float
          description: "Pourcentage moyen de membres à jour de cotisation (moyenne non pondérée)"
          minimum: 0
          maximum: 100
          example: 80.6
        collectivites:
          type: array
          description: "Liste des statistiques par collectivité (triées par taux d'assiduité décroissant)"
          items:
            $ref: '#/components/schemas/StatistiquesCollectivite'
        collectiviteLaPlusMeritante:
          type: object
          description: "Collectivité avec le meilleur taux d'assiduité (à féliciter)"
          required:
            - collectiviteId
            - nomCollectivite
            - tauxAssiduiteGlobal
          properties:
            collectiviteId:
              type: integer
              format: int32
            nomCollectivite:
              type: string
            tauxAssiduiteGlobal:
              type: number
              format: float
          example:
            collectiviteId: 3
            nomCollectivite: "Collectivité Arboricole de Fianarantsoa"
            tauxAssiduiteGlobal: 92.5
        collectiviteAMeliorer:
          type: object
          description: "Collectivité avec le plus faible taux d'assiduité (à améliorer)"
          required:
            - collectiviteId
            - nomCollectivite
            - tauxAssiduiteGlobal
          properties:
            collectiviteId:
              type: integer
              format: int32
            nomCollectivite:
              type: string
            tauxAssiduiteGlobal:
              type: number
              format: float
          example:
            collectiviteId: 4
            nomCollectivite: "Collectivité Piscicole de Morondava"
            tauxAssiduiteGlobal: 55.0

paths:
  /collectivites:
    get:
      tags:
        - Collectivités
      summary: "Lister toutes les collectivités"
      description: "Retourne la liste de toutes les collectivités de la fédération"
      operationId: getCollectivites
      responses:
        '200':
          description: "Liste des collectivités"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Collectivite'
                example:
                  - id: 1
                    numero: "CA-001"
                    nom: "Collectivité Rizicole d'Ambatondrazaka"
                    ville: "Ambatondrazaka"
                    specialite: RIZICULTURE
                    dateCreation: "2020-04-15"
                    nombreMembres: 50
                  - id: 2
                    numero: "CA-002"
                    nom: "Collectivité Maraîchère de Toamasina"
                    ville: "Toamasina"
                    specialite: MARAICHAGE
                    dateCreation: "2021-06-20"
                    nombreMembres: 30
        '500':
          description: "Erreur interne du serveur"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      tags:
        - Collectivités
      summary: Ouvrir une nouvelle collectivité
      description: "Crée une nouvelle collectivité agricole. La fédération valide les conditions
        d'ouverture (au moins 10 membres avec 5 membres ayant6 mois d'ancienneté, postes spécifiques
        pourvus, autorisation formelle accordée)."
      operationId: createCollectivite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCollectivite'
      responses:
        '201':
          description: "Collectivité créée avec succès"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Collectivite'
              example:
                id: 3
                numero: "CA-003"
                nom: "Collectivité Arboricole de Fianarantsoa"
                ville: "Fianarantsoa"
                specialite: ARBORICULTURE
